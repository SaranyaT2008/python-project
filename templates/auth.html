{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-card">
    {% if is_login %}
        <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label" for="email">College Email</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="student@college.edu">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-submit">Login</button>
        </form>

        <div style="margin: 1.5rem 0; display: flex; align-items: center; gap: 1rem; color: var(--text-muted);">
            <hr style="flex: 1; border-color: rgba(255,255,255,0.1);"> <span>OR</span> <hr style="flex: 1; border-color: rgba(255,255,255,0.1);">
        </div>

        <a href="{{ url_for('google_login') }}" class="btn-google" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: white; color: #444; font-weight: 600; text-decoration: none; border: 1px solid #ddd; transition: all 0.2s;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" height="18">
            Sign in with Google
        </a>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-color);">Register here</a>
        </p>
    {% else %}
        <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label class="form-label" for="email">College Email</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="student@college.edu">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-submit">Register</button>
        </form>

        <div style="margin: 1.5rem 0; display: flex; align-items: center; gap: 1rem; color: var(--text-muted);">
            <hr style="flex: 1; border-color: rgba(255,255,255,0.1);"> <span>OR</span> <hr style="flex: 1; border-color: rgba(255,255,255,0.1);">
        </div>

        <a href="{{ url_for('google_login') }}" class="btn-google" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: white; color: #444; font-weight: 600; text-decoration: none; border: 1px solid #ddd; transition: all 0.2s;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" height="18">
            Sign up with Google
        </a>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Login here</a>
        </p>
    {% endif %}
</div>
{% endblock %}
